<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Places - HBnB</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/Favicon.png">
  </head>
  <body>

    <!-- Header -->
    <header>
      <div>
        <a href="index.html">
          <img class="logo" src="images/Logo.png" alt="HBnB logo">
        </a>
        <nav>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html" id="login-link" class="login-button">Login</a></li>
            <li><button id="logout-button" class="logout-button" style="display:none;">Logout</button></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Main -->
    <main>

      <!-- Message de bienvenue -->
      <div id="welcome-banner" style="display:none;"></div>

      <!-- Filtre par prix -->
      <section id="filter">
        <label for="price-filter">Max Price :</label>
        <select id="price-filter">
          <option value="all">All</option>
          <option value="50">50 €</option>
          <option value="100">100 €</option>
          <option value="150">150 €</option>
          <option value="200">200 €</option>
        </select>
      </section>

      <!-- Liste des places -->
      <section id="places-list">

      </section>

    </main>

    <!-- Footer -->
    <footer>
      <img src="images/Logo.png" alt="HBnB logo">
      <address>
        106 Av. Pierre de Coubertin<br>
        53000 Laval, France
      </address>

      <hr>

      <p>2026 HBnB, made by A&A&M, All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
  </body>
</html>
