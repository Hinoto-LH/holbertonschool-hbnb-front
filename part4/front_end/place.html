<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Details - HBnB</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/Favicon.png">
  </head>
  <body>

    <!-- Header -->
    <header>
      <div>
        <a href="index.html">
          <img class="logo" src="images/Logo.png" alt="HBnB logo">
        </a>
        <nav>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html" id="login-link" class="login-button">Login</a></li>
            <li><button id="logout-button" class="logout-button" style="display:none;">Logout</button></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Main -->
    <main>

      <!-- Détails du lieu -->
      <section id="place-details" class="place-details">
        <!-- Populated dynamically via JS -->
      </section>

      <!-- Reviews existantes -->
      <section id="reviews">
        <h2>Reviews</h2>
        <!-- Populated dynamically via JS -->

      </section>

      <!-- Formulaire ajout review — visible uniquement si connecté -->
      <section id="add-review" class="add-review" style="display: none;">
        <h2>Add a Review</h2>
        <form id="review-form" class="form">

          <label for="review-text">Your Review :</label>
          <textarea id="review-text" name="review-text" rows="5"
            placeholder="Write your review here..." required></textarea>

          <label for="rating">Rating :</label>
          <select id="rating" name="rating" required>
            <option value="">-- Select a rating --</option>
            <option value="1">1 - Poor</option>
            <option value="2">2 - Fair</option>
            <option value="3">3 - Good</option>
            <option value="4">4 - Very Good</option>
            <option value="5">5 - Excellent</option>
          </select>

          <button type="submit">Submit Review</button>
        </form>
      </section>

    </main>

    <!-- Footer -->
    <footer>
      <img src="images/Logo.png" alt="HBnB logo">
      <address>
        106 Av. Pierre de Coubertin<br>
        53000 Laval, France
      </address>

      <hr>

      <p>2026 HBnB, made by A&A&M, All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
  </body>
</html>
